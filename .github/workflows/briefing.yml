# Generate Gulf Briefing daily at 6am GST (Gulf Standard Time)
# Also runs on manual trigger for testing

name: Generate Gulf Briefing

on:
  schedule:
    # 6am GST = 02:00 UTC (GST is UTC+4)
    - cron: '0 2 * * *'

  # Manual trigger for testing
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Scrape news sources
        run: node generate-briefing.js

      - name: Write all three styles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node write-briefing.js
          cp briefing.md conversational.md
          cp index.html conversational.html
          node write-briefing.js --style=bullets
          mv briefing.md bullets.md
          mv index.html bullets.html
          node write-briefing.js --style=wib
          mv briefing.md wib.md
          mv index.html wib.html
          cp conversational.md briefing.md
          cp conversational.html index.html

      - name: Add navigation bar to all styles
        run: node add-nav.js

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add briefing.json conversational.md conversational.html index.html bullets.md bullets.html wib.md wib.html screenshots/
          git diff --staged --quiet || git commit -m "Update Gulf briefing $(TZ=Asia/Dubai date +%Y-%m-%d)"
          git push
